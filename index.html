<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLADKO | Онлайн-запись</title>
    <style>
        :root { --gold: #d4a373; --dark: #4a4540; --light: #fdfaf7; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); color: var(--dark); margin: 0; padding: 20px; }
        .booking-card { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        h2 { text-align: center; font-weight: 300; letter-spacing: 2px; }
        
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 0.9rem; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        /* Сетка времени */
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .time-btn { padding: 10px; border: 1px solid #eee; background: white; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: center; }
        .time-btn:hover { border-color: var(--gold); color: var(--gold); }
        .time-btn.active { background: var(--gold); color: white; border-color: var(--gold); }

        .total-price { background: #fdfaf7; padding: 20px; border-radius: 15px; text-align: center; margin: 20px 0; border: 1px dashed var(--gold); }
        .total-price span { font-size: 1.5rem; font-weight: bold; color: var(--gold); }

        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; font-size: 0.8rem; color: #888; margin-top: 20px; }
        .checkbox-group input { width: auto; margin-top: 3px; }

        .btn-submit { width: 100%; background: var(--gold); color: white; padding: 18px; border: none; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background: #bc8a5f; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="booking-card">
    <h2>Запись в GLADKO</h2>

    <label>Выберите услугу:</label>
    <select id="service" onchange="updatePrice()">
        <option value="0" data-price="0">-- Выберите из списка --</option>
        <option value="Комплекс S" data-price="1300">Комплекс S (1300 сом)</option>
        <option value="Комплекс M" data-price="2100">Комплекс M (2100 сом)</option>
        <option value="Комплекс L" data-price="2700">Комплекс L (2700 сом)</option>
        <option value="Комплекс XL" data-price="3500">Комплекс XL (3500 сом)</option>
        <option value="Глубокое бикини" data-price="800">Глубокое бикини (800 сом)</option>
        <option value="Ноги полностью" data-price="1600">Ноги полностью (1600 сом)</option>
    </select>

    <label>Выберите дату:</label>
    <input type="date" id="date">

    <label>Доступное время:</label>
    <div class="time-grid" id="timeGrid">
        <div class="time-btn" onclick="selectTime(this)">10:00</div>
        <div class="time-btn" onclick="selectTime(this)">12:00</div>
        <div class="time-btn" onclick="selectTime(this)">14:00</div>
        <div class="time-btn" onclick="selectTime(this)">16:00</div>
        <div class="time-btn" onclick="selectTime(this)">17:00</div>
        <div class="time-btn" onclick="selectTime(this)">19:00</div>
    </div>

    <label>Ваше имя:</label>
    <input type="text" id="name" placeholder="Введите имя">

    <label>Ваш телефон:</label>
    <input type="tel" id="phone" placeholder="+996 (_) --">

    <label>E-mail (необязательно):</label>
    <input type="email" id="email" placeholder="example@mail.com">

    <label>Комментарий:</label>
    <textarea id="comment" rows="2" placeholder="Например: аллергия или пожелания"></textarea>

    <div class="total-price">
        Итого к оплате: <br>
        <span id="displayPrice">0</span> сом
    </div>
<div class="checkbox-group">
        <input type="checkbox" id="agree" checked>
        <label for="agree">Я согласен на обработку персональных данных и подтверждаю корректность информации.</label>
    </div>

    <button class="btn-submit" onclick="sendToWhatsApp()">ЗАПИСАТЬСЯ</button>
</div>

<script>
    let selectedTime = "";

    function selectTime(btn) {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedTime = btn.innerText;
    }

    function updatePrice() {
        const select = document.getElementById('service');
        const price = select.options[select.selectedIndex].getAttribute('data-price');
        document.getElementById('displayPrice').innerText = price;
    }

    function sendToWhatsApp() {
        const service = document.getElementById('service').value;
        const date = document.getElementById('date').value;
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const price = document.getElementById('displayPrice').innerText;
        const comment = document.getElementById('comment').value;
        const agree = document.getElementById('agree').checked;

        if (service == "0"  !date  !selectedTime  !name  !phone) {
            alert("Пожалуйста, заполните все основные поля и выберите время!");
            return;
        }

        if (!agree) {
            alert("Нужно подтвердить согласие на обработку данных");
            return;
        }

        // ЗАМЕНИ ТУТ НОМЕР НА СВОЙ
        const myNumber = "996XXXXXXXXX"; 
        
        const text = ЗАЯВКА С САЙТА GLADKO:%0A +
                     ------------------------%0A +
                     🌸 Услуга: ${service}%0A +
                     📅 Дата: ${date}%0A +
                     ⏰ Время: ${selectedTime}%0A +
                     ------------------------%0A +
                     👤 Клиент: ${name}%0A +
                     📞 Телефон: ${phone}%0A +
                     💬 Коммент: ${comment}%0A +
                     💰 Сумма: ${price} сом;

        window.open(https://wa.me/${myNumber}?text=${text}, '_blank');
    }
</script>

</body>
</html>
